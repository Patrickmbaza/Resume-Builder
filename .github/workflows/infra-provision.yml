name: Infra Provision

on:
  workflow_dispatch:

concurrency:
  group: infra-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  provision:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
      TF_ENVIRONMENT: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          set -euo pipefail
          required=(AWS_REGION AWS_ROLE_TO_ASSUME TF_STATE_BUCKET TF_LOCK_TABLE TF_STATE_KEY)
          for v in "${required[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "Missing repository variable: $v"
              exit 1
            fi
          done

      - name: Debug GitHub context
        run: |
          echo "repository=${GITHUB_REPOSITORY}"
          echo "ref=${GITHUB_REF}"
          echo "event_name=${GITHUB_EVENT_NAME}"

      - name: Debug OIDC claims
        run: |
          set -euo pipefail
          TOKEN_RESPONSE="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          OIDC_TOKEN="$(echo "${TOKEN_RESPONSE}" | jq -r '.value')"
          OIDC_PAYLOAD="$(echo "${OIDC_TOKEN}" | cut -d '.' -f2 | base64 -d 2>/dev/null || echo "${OIDC_TOKEN}" | cut -d '.' -f2 | tr '_-' '/+' | base64 -d)"
          echo "oidc_payload=${OIDC_PAYLOAD}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Terraform apply
        run: bash infra/terraform/scripts/terraform_apply.sh

      - name: Show outputs
        run: terraform -chdir=infra/terraform output
