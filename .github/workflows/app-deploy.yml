name: App Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: app-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and Deploy App
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          set -euo pipefail
          required=(AWS_REGION AWS_ROLE_TO_ASSUME TF_STATE_BUCKET TF_LOCK_TABLE TF_STATE_KEY)
          for v in "${required[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "Missing repository variable: $v"
              exit 1
            fi
          done

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Load Terraform outputs
        id: tf
        run: |
          set -euo pipefail
          terraform -chdir=infra/terraform init \
            -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

          ECR_REPOSITORY_URL="$(terraform -chdir=infra/terraform output -raw ecr_repository_url)"
          if [ -z "${ECR_REPOSITORY_URL}" ] || [ "${ECR_REPOSITORY_URL}" = "null" ]; then
            echo "ECR repository URL not found in Terraform state. Run Infra Provision first."
            exit 1
          fi

          echo "ecr_repository_url=${ECR_REPOSITORY_URL}" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_TAG="sha-${SHORT_SHA}"
          IMAGE_URI="${{ steps.tf.outputs.ecr_repository_url }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker build secrets
        id: docker-secrets
        run: |
          set -euo pipefail
          secret_files=()

          if [ -n "${VITE_OPENAI_API_KEY:-}" ]; then
            printf '%s' "${VITE_OPENAI_API_KEY}" > vite_openai_api_key.txt
            secret_files+=("vite_openai_api_key=${PWD}/vite_openai_api_key.txt")
          fi

          if [ -n "${VITE_OPENROUTER_API_KEY:-}" ]; then
            printf '%s' "${VITE_OPENROUTER_API_KEY}" > vite_openrouter_api_key.txt
            secret_files+=("vite_openrouter_api_key=${PWD}/vite_openrouter_api_key.txt")
          fi

          {
            echo "secret_files<<EOF"
            printf '%s\n' "${secret_files[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
        env:
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}

      - name: Build and push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.image_uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secret-files: ${{ steps.docker-secrets.outputs.secret_files }}

      - name: Apply Terraform with new image tag
        run: |
          set -euo pipefail
          bash infra/terraform/scripts/terraform_apply.sh \
            -var="create_apprunner_service=true" \
            -var="image_tag=${IMAGE_TAG}"
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}

      - name: Clean up Docker build secrets
        if: always()
        run: rm -f vite_openai_api_key.txt vite_openrouter_api_key.txt

      - name: Show Terraform outputs
        run: terraform -chdir=infra/terraform output
